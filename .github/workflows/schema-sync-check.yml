name: Schema and Library Sync Check

on:
  push:
    branches: [ main ]
    paths:
      - 'esm-schema.json'
      - 'pkg/*/src/esm-schema.json'
      - 'pkg/*/data/esm-schema.json'
      - 'pkg/*/src/*/data/esm-schema.json'
      - 'pkg/*/pkg/*/esm-schema.json'
      - 'pkg/*/package.json'
      - 'pkg/*/pyproject.toml'
      - 'pkg/*/Cargo.toml'
      - 'pkg/*/Project.toml'
      - 'scripts/sync-schema.sh'
      - 'lib/*.esm'
      - 'docs/static/lib/*.esm'
      - 'scripts/sync-lib.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'esm-schema.json'
      - 'pkg/*/src/esm-schema.json'
      - 'pkg/*/data/esm-schema.json'
      - 'pkg/*/src/*/data/esm-schema.json'
      - 'pkg/*/pkg/*/esm-schema.json'
      - 'pkg/*/package.json'
      - 'pkg/*/pyproject.toml'
      - 'pkg/*/Cargo.toml'
      - 'pkg/*/Project.toml'
      - 'scripts/sync-schema.sh'
      - 'lib/*.esm'
      - 'docs/static/lib/*.esm'
      - 'scripts/sync-lib.sh'

jobs:
  check-schema-sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check schema copies and binding versions are in sync
      run: scripts/sync-schema.sh --check

    - name: Check the standard library mirror (docs/static/lib) is in sync
      run: scripts/sync-lib.sh --check

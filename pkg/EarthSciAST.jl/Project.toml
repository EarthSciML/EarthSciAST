# Track EarthSciIO (unregistered) from GitHub for the extension tests WITHOUT
# adding it to the package's own [deps] (it stays a weakdep). `[sources]` is
# honoured only when this Project is the active/develop env (i.e. under
# `Pkg.test()` / the test target), so a downstream `add EarthSciAST` ignores it.
[sources]
EarthSciIO = {url = "https://github.com/EarthSciML/EarthSciIO.git", subdir = "julia"}

